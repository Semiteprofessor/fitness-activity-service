server:
  port: 8082

spring:
  application:
    name: activity-service

  mongodb:
    uri: mongodb://localhost:27017/fitness
    database: fitness

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking